<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3 | R3X_PROTOCOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="terminal">
        <header class="terminal-header">
            <span class="status-dot"></span>
            <span class="title">R3X@SYSTEM_TERMINAL: ~/home</span>
        </header>
        <div class="terminal-body" id="console">
            <p class="line">[OK] INITIALIZING X3_KERNEL_V2.1...</p>
            <p class="line">[OK] BYPASSING FIREWALL... 100%</p>
            <p class="line">[WARNING] R3X LEVEL ACCESS DETECTED.</p>
            <p class="command-line">Welcome, R3X. Siap ngebrak-abrik apa hari ini?</p>
            <div id="output"></div>
            <div class="input-area">
                <span class="prompt">R3X@X3:~$</span>
                <input type="text" id="user-input" autofocus>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
