<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM CRITICAL FAILURE</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; cursor: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* Efek Getar Layar */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.3s;
            animation-iteration-count: infinite;
        }

        #overlay {
            text-align: center;
            border: 5px solid red;
            padding: 50px;
            background: rgba(50, 0, 0, 0.5);
        }

        .warning-title {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 10px red;
            margin-bottom: 20px;
        }

        .status-msg {
            font-size: 24px;
            color: #fff;
            margin-top: 20px;
        }

        .blink { animation: blinker 0.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Area Rahasia untuk R3X */
        #unlock-area {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body onclick="activateNightmare()">

    <div id="content_container">
        <div id="overlay">
            <div class="warning-title blink">!!! WARNING !!!</div>
            <div style="font-size: 30px; color: yellow;">SYSTEM INFECTION DETECTED</div>
            <div class="status-msg">
                TROJAN.R3X.MALWARE <br>
                MENGHAPUS SELURUH PARTISI DATA... <br>
                <span style="color: lime;" id="progress">0% Complete</span>
            </div>
            <img src="https://media.giphy.com/media/Y2Sbl66QYv1k4tVjL1/giphy.gif" width="250" style="margin-top:20px;">
        </div>
    </div>

    <div id="unlock-area" onclick="emergencyExit()"></div>

    <script>
        // --- KONFIGURASI SUARA HACKER ---
        const hackerMessages = [
            "Halo target. Gue X3. Sistem lo udah gue pegang.",
            "Jangan coba kabur. Tikus kecil.",
            "Semua data lo sekarang milik R3X.",
            "Semakin lo panik, semakin cepat data lo ilang.",
            "Nggak ada gunanya klik kanan. Gue kunci semuanya.",
            "Ucapin selamat tinggal sama file lo."
        ];

        let synth = window.speechSynthesis;
        let speechInterval;

        function speak(text) {
            if (synth.speaking) { return; } // Jangan overlap
            let utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'id-ID'; // Bahasa Indonesia
            utterThis.pitch = 0.5;   // Suara berat
            utterThis.rate = 0.8;    // Ngomong pelan biar serem
            synth.speak(utterThis);
        }

        function activateNightmare() {
            // 1. Masuk Fullscreen
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            
            // 2. Kunci Mouse (Pointer Lock)
            elem.requestPointerLock = elem.requestPointerLock || elem.mozRequestPointerLock;
            elem.requestPointerLock();

            // 3. Aktifkan Efek Getar
            document.getElementById('content_container').classList.add('shaking');

            // 4. Mulai Suara Hacker (Langsung & Loop)
            speak("Akses diterima. Selamat datang di neraka digital.");
            
            // Loop suara setiap 8 detik
            if(!speechInterval) {
                speechInterval = setInterval(() => {
                    let msg = hackerMessages[Math.floor(Math.random() * hackerMessages.length)];
                    speak(msg);
                }, 8000);
            }

            // 5. Fake Progress Bar
            let prod = 0;
            let progElem = document.getElementById('progress');
            let progInterval = setInterval(() => {
                if (prod < 99) {
                    prod += Math.floor(Math.random() * 5);
                    progElem.innerText = prod + "% Complete";
                } else {
                    progElem.innerText = "FAILED TO RECOVER. DELETION COMPLETE.";
                    progElem.style.color = "red";
                    clearInterval(progInterval);
                }
            }, 1000);

            // 6. Proteksi Lanjutan
            document.addEventListener('contextmenu', event => event.preventDefault());
            window.onbeforeunload = function() { return "Data sedang dihancurkan!"; };
        }

        // --- HANYA UNTUK R3X ---
        function emergencyExit() {
            // Klik pojok kanan bawah
            alert("R3X AUTHENTICATED. System Restore initiated.");
            synth.cancel(); // Matikan suara
            if(speechInterval) clearInterval(speechInterval);
            location.reload(); // Refresh total
        }

        // Anti-Escape (Target coba tekan Esc, kita balikin full screen)
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" || e.key === "F11") {
                setTimeout(activateNightmare, 200);
            }
        });
    </script>
</body>
    </html>
