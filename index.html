<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITICAL ERROR | SYSTEM BREACH</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: none;
        }

        #prank-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #440000 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10000;
        }

        .glitch {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); text-shadow: 2px 2px #fff; }
            100% { transform: translate(1px, -1px); }
        }

        .progress-container {
            width: 80%;
            border: 2px solid #ff0000;
            height: 25px;
            margin-top: 30px;
            background: #220000;
        }

        #bar {
            width: 0%;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        .warning-text {
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body onclick="initHacked()">

    <div id="prank-screen">
        <div class="glitch">SYSTEM HACKED</div>
        <p class="warning-text">ALL PRIVATE DATA IS BEING UPLOADED TO R3X SERVER</p>
        
        <div class="progress-container">
            <div id="bar"></div>
        </div>
        <p id="percent" style="font-size: 2rem; margin-top: 10px;">0%</p>
        
        <div style="margin-top: 50px; color: #fff; font-size: 0.8rem; opacity: 0.5;">
            IP ADDRESS: <span id="ip">TRACKING...</span><br>
            LOCATION: ENCRYPTED<br>
            STATUS: DEVICE CONTROLLED BY X3
        </div>
    </div>

    <script>
        // Suara Hacker Berbicara
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-US'; // Pake Inggris biar lebih serem ala hacker global
            msg.rate = 0.8; // Agak lambat biar misterius
            msg.pitch = 0.1; // Suara berat
            window.speechSynthesis.speak(msg);
        }

        function initHacked() {
            // Ngomong pas dimulai
            speak("Warning. Your system has been breached by R 3 X. Accessing private files. Do not close this window or your data will be deleted instantly.");
            
            // Efek Getar
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 1000]);
            }

            // Animasi Progress
            let width = 0;
            const bar = document.getElementById('bar');
            const pct = document.getElementById('percent');
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    pct.innerText = "COMPLETE";
                    speak("Upload complete. Goodbye.");
                } else {
                    width++;
                    bar.style.width = width + '%';
                    pct.innerText = width + '%';
                    
                    // Suara random saat proses
                    if (width === 50) speak("Downloading images and contacts.");
                    if (width === 85) speak("Finalizing encryption.");
                }
            }, 80);
        }

        // Auto-start (Beberapa browser butuh interaksi user, jadi tambahin klik di mana aja)
        window.onload = () => {
            document.body.innerHTML += '<div style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:10001; background:transparent;" id="overlay"></div>';
            alert("SYSTEM ERROR: UNKNOWN SOURCE DETECTED!");
            // Setelah klik OK di alert, fungsi suara & animasi akan aktif saat user klik layar
        };
    </script>
</body>
</html>
